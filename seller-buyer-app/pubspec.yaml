name: seller_buyer_app
description: GogoMarket — Social e-commerce for Uzbekistan
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  hydrated_bloc: ^9.1.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # DI
  get_it: ^7.7.0
  injectable: ^2.3.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  photo_view: ^0.14.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.1.0

  # Video
  video_player: ^2.8.7
  chewie: ^1.8.3

  # Camera / Media
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Auth
  local_auth: ^2.2.0
  pin_code_fields: ^8.0.1

  # Push notifications
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  flutter_local_notifications: ^17.2.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  uuid: ^4.4.0
  timeago: ^3.6.1
  flutter_screenutil: ^5.9.3

  # Icons & fonts
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/

  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
