name: seller_buyer_app
description: GogoMarket — social commerce for Uzbekistan
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.4
  hydrated_bloc: ^9.1.4
  equatable: ^2.0.5
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.1
  retrofit: ^4.1.0
  socket_io_client: ^2.0.3+1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # UI
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pin_code_fields: ^8.0.1
  photo_view: ^0.14.0
  fl_chart: ^0.67.0

  # Map & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2

  # Utils
  intl: ^0.19.0
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
