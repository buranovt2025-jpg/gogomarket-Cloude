name: courier_admin_app
description: GogoMarket — Courier & Admin app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  hydrated_bloc: ^9.1.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # DI
  get_it: ^7.7.0

  # Maps & GPS
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  flutter_screenutil: ^5.9.3

  # Real-time
  socket_io_client: ^2.0.3+1

  # Auth
  local_auth: ^2.2.0
  pin_code_fields: ^8.0.1

  # Push notifications

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  timeago: ^3.6.1
  path_provider: ^2.1.3
  image_picker: ^1.0.7

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
