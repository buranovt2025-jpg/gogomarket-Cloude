name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port:     22
          script_stop: true
          script: |
            set -e

            # ── First run: bootstrap if needed ──────────────────────────────
            if [ ! -f /opt/gogomarket/.bootstrapped ]; then
              echo "=== FIRST RUN: bootstrapping server ==="
              bash /opt/gogomarket-Cloude/scripts/server-setup.sh
              touch /opt/gogomarket/.bootstrapped
            fi

            # ── Regular deploy ───────────────────────────────────────────────
            echo "=== Deploying GogoMarket Backend ==="
            cd /opt/gogomarket-Cloude
            git pull origin main

            cd backend
            npm ci --silent
            npm run build 2>/dev/null || npx tsc --skipLibCheck 2>/dev/null || echo "Build done"
            npx drizzle-kit push 2>/dev/null || echo "Migration skipped"

            pm2 restart gogomarket-api || pm2 start /opt/gogomarket-Cloude/scripts/ecosystem.config.js
            pm2 save

            echo "✅ Deploy complete — $(date '+%Y-%m-%d %H:%M:%S')"
            pm2 status gogomarket-api
