name: 🚚 Courier-Admin APK

on:
  push:
    branches: [ main ]
    paths:
      - 'courier-admin-app/**'
      - '.github/workflows/flutter-courier-admin.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 206.189.12.56
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 30m
          command_timeout: 25m
          script: |
            set -e
            export PATH="/opt/flutter/bin:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:$PATH"
            export ANDROID_HOME=/opt/android-sdk
            export ANDROID_SDK_ROOT=/opt/android-sdk

            echo "📦 Pulling latest code..."
            cd /opt/gogomarket-Cloude
            git pull origin main

            echo "🚚 Building Courier-Admin APK..."
            cd /opt/gogomarket-Cloude/courier-admin-app

            # Init android if not exists
            if [ ! -d "android" ]; then
              echo "⚙️ Initializing Android platform..."
              flutter create --platforms=android .
              # Set package name
              sed -i 's/com.example.courier_admin_app/uz.gogomarket.courier/g' \
                android/app/build.gradle \
                android/app/src/main/AndroidManifest.xml \
                android/app/src/debug/AndroidManifest.xml \
                android/app/src/profile/AndroidManifest.xml 2>/dev/null || true
            fi

            flutter pub get
            flutter build apk --release \
              --dart-define=API_URL=http://206.189.12.56/api/v1 \
              --no-tree-shake-icons

            APK_PATH=$(find build/app/outputs -name "*.apk" | head -1)
            echo "✅ APK: $APK_PATH"

            # Copy to nginx public folder
            mkdir -p /var/www/html/apk
            cp "$APK_PATH" /var/www/html/apk/gogomarket-courier-admin.apk
            echo "📱 APK available at: http://206.189.12.56/apk/gogomarket-courier-admin.apk"

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} *Courier-Admin APK*
            Статус: ${{ job.status }}
            Коммит: `${{ github.sha }}`
            ${{ job.status == 'success' && '📥 http://206.189.12.56/apk/gogomarket-courier-admin.apk' || '' }}
