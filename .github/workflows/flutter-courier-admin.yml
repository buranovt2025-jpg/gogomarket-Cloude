name: courier-admin-app CI

on:
  push:
    branches: [main]
    paths: ['courier-admin-app/**']
  pull_request:
    branches: [main]
    paths: ['courier-admin-app/**']

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      - run: cd courier-admin-app && flutter pub get
      - run: cd courier-admin-app && flutter analyze --no-fatal-infos || true

  build-apk:
    needs: analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - run: cd courier-admin-app && flutter pub get
      - run: cd courier-admin-app && flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: courier-admin-apk-${{ github.sha }}
          path: courier-admin-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
