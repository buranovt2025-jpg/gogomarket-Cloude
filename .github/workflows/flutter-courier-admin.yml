name: 🚚 GogoMarket Courier APK

on:
  push:
    branches: [main]
    paths:
      - 'courier-admin-app/**'
      - '.github/workflows/flutter-courier-admin.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: courier-admin-app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Flutter pub get
        working-directory: courier-admin-app
        run: flutter pub get 2>&1 | tee /tmp/pubget.log

      - name: Flutter analyze
        working-directory: courier-admin-app
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.log
        continue-on-error: true

      - name: Build APK
        working-directory: courier-admin-app
        run: flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: courier-admin-apk
          path: courier-admin-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Notify Telegram
        if: always()
        env:
          TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
          TG_CHAT_ID: "906884"
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK=$(find courier-admin-app/build -name "app-release.apk" 2>/dev/null | head -1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -n "$APK" ] && [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            SIZE_BYTES=$(stat -c%s "$APK")

            if [ "$SIZE_BYTES" -lt 49000000 ]; then
              # Меньше 49MB — отправляем файлом
              curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@${APK}" \
                -F "caption=🚚 Courier APK готов! ${SHORT_SHA} | ${SIZE}"
            else
              # Больше 49MB — отправляем ссылку на artifact
              curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TG_CHAT_ID}" \
                -d "text=🚚 Courier APK готов! ${SHORT_SHA} | ${SIZE}%0AСкачай здесь: ${RUN_URL}%0A(вкладка Artifacts)" \
                -d "parse_mode=HTML"
            fi
          else
            {
              echo "=== ANALYZE ERRORS ==="
              grep -E "error •" /tmp/analyze.log 2>/dev/null | head -30
              echo "=== BUILD ERRORS ==="
              grep -E "error:|Error:|FAILED|Exception" /tmp/build.log 2>/dev/null | head -40
              echo "=== BUILD TAIL ==="
              tail -30 /tmp/build.log 2>/dev/null
            } > /tmp/error.txt

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@/tmp/error.txt" \
              -F "caption=❌ Courier упало ${SHORT_SHA}"
            exit 1
          fi
