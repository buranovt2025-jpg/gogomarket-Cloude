name: 📱 GogoMarket APK

on:
  push:
    branches: [main]
    paths:
      - 'seller-buyer-app/**'
      - '.github/workflows/flutter-seller-buyer.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: seller-buyer-app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          cat local.properties

      - name: Flutter pub get
        working-directory: seller-buyer-app
        run: flutter pub get 2>&1 | tee /tmp/pubget.log

      - name: Flutter analyze
        working-directory: seller-buyer-app
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.log
        continue-on-error: true

      - name: Build APK
        working-directory: seller-buyer-app
        run: flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Check result and notify
        env:
          TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
          TG_CHAT_ID: "906884"
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK=$(find seller-buyer-app/build -name "app-release.apk" 2>/dev/null | head -1)

          if [ -n "$APK" ] && [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@${APK}" \
              -F "caption=✅ APK готов! ${SHORT_SHA} | ${SIZE}"
          else
            # Собираем лог
            {
              echo "=== ANALYZE ERRORS ==="
              grep -E "error •" /tmp/analyze.log 2>/dev/null | head -30
              echo ""
              echo "=== BUILD ERRORS ==="
              grep -E "error:|Error:|FAILED|Exception|Unresolved" /tmp/build.log 2>/dev/null | head -40
              echo ""
              echo "=== BUILD TAIL ==="
              tail -40 /tmp/build.log 2>/dev/null
            } > /tmp/error.txt

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@/tmp/error.txt" \
              -F "caption=❌ Упало ${SHORT_SHA}"

            exit 1
          fi
