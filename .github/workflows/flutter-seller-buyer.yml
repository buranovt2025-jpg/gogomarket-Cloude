name: üì± GogoMarket APK

on:
  push:
    branches: [main]
    paths:
      - 'seller-buyer-app/**'
      - '.github/workflows/flutter-seller-buyer.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: seller-buyer-app
        run: flutter pub get 2>&1 | tee /tmp/pubget.log

      - name: Flutter analyze
        working-directory: seller-buyer-app
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.log
        continue-on-error: true

      - name: Build APK
        working-directory: seller-buyer-app
        run: flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Check result and notify
        env:
          TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
          TG_CHAT_ID: "906884"
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK=$(find seller-buyer-app/build -name "app-release.apk" 2>/dev/null | head -1)
          
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            # SUCCESS - send APK
            SIZE=$(du -sh "$APK" | cut -f1)
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@${APK}" \
              -F "caption=‚úÖ APK –≥–æ—Ç–æ–≤! ${SHORT_SHA} | ${SIZE}"
          else
            # FAILURE - collect and send logs
            echo "=== BUILD LOG ===" > /tmp/full_error.txt
            grep -E "error:|Error:|FAILED|Exception|‚úó|cannot|Could not|Unresolved" /tmp/build.log 2>/dev/null | head -40 >> /tmp/full_error.txt
            echo "" >> /tmp/full_error.txt
            echo "=== ANALYZE ===" >> /tmp/full_error.txt
            grep -E "error ‚Ä¢|warning ‚Ä¢" /tmp/analyze.log 2>/dev/null | head -20 >> /tmp/full_error.txt
            echo "" >> /tmp/full_error.txt
            echo "=== LAST 30 LINES ===" >> /tmp/full_error.txt
            tail -30 /tmp/build.log >> /tmp/full_error.txt

            # Send as file to Telegram
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@/tmp/full_error.txt" \
              -F "caption=‚ùå –°–±–æ—Ä–∫–∞ —É–ø–∞–ª–∞ ${SHORT_SHA} ‚Äî —Å–º–æ—Ç—Ä–∏ –ª–æ–≥"
            
            # Also send short summary as message
            SUMMARY=$(grep -E "error:|Error:|FAILED" /tmp/build.log 2>/dev/null | head -5 | tr '\n' ' ')
            MSG="‚ùå ${SHORT_SHA}: ${SUMMARY}"
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MSG}"
            
            exit 1
          fi
