name: 📱 GogoMarket APK

on:
  push:
    branches: [main]
    paths:
      - 'seller-buyer-app/**'
      - '.github/workflows/flutter-seller-buyer.yml'
  workflow_dispatch:

env:
  TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
  TG_CHAT_ID: "906884"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: seller-buyer-app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: seller-buyer-app
        run: flutter analyze --no-fatal-infos 2>&1 | tail -50
        continue-on-error: true

      - name: Build APK
        id: build
        working-directory: seller-buyer-app
        run: |
          flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/build_log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Send APK to Telegram
        if: success()
        run: |
          APK=$(find seller-buyer-app/build -name "app-release.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          CAPTION="✅ GogoMarket APK готов!
Размер: ${SIZE} | ${SHORT_SHA}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@${APK}" \
            -F "caption=${CAPTION}"

      - name: Send error to Telegram
        if: failure()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Берём последние 50 строк лога с ошибкой
          ERROR=$(tail -60 /tmp/build_log.txt 2>/dev/null | grep -E "error:|Error|FAILED|Exception|✗" | head -20 || echo "см. логи GitHub Actions")
          MSG="❌ Сборка упала! ${SHORT_SHA}

🔴 Ошибка:
${ERROR}

🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}"
