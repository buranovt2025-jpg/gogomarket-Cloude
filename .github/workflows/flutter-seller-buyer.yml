name: seller-buyer-app CI

on:
  push:
    branches: [main]
    paths:
      - 'seller-buyer-app/**'
      - '.github/workflows/flutter-seller-buyer.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable
          cache: true

      - name: Create asset dirs
        run: |
          mkdir -p seller-buyer-app/assets/images
          mkdir -p seller-buyer-app/assets/icons
          mkdir -p seller-buyer-app/assets/fonts
          # Placeholder font files so pubspec doesn't fail
          touch seller-buyer-app/assets/fonts/Inter-Regular.ttf
          touch seller-buyer-app/assets/fonts/Inter-Medium.ttf
          touch seller-buyer-app/assets/fonts/Inter-SemiBold.ttf
          touch seller-buyer-app/assets/fonts/Inter-Bold.ttf
          touch seller-buyer-app/assets/fonts/PlayfairDisplay-Bold.ttf

      - name: Flutter pub get
        run: cd seller-buyer-app && flutter pub get

      - name: Build APK
        run: |
          cd seller-buyer-app
          flutter build apk --release --no-tree-shake-icons --no-shrink 2>&1 | tail -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GogoMarket-${{ github.sha }}
          path: |
            seller-buyer-app/build/app/outputs/flutter-apk/app-release.apk
            seller-buyer-app/build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Find APK
        run: find seller-buyer-app/build -name "*.apk" 2>/dev/null | head -5
