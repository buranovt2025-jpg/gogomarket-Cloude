name: 📱 GogoMarket APK

on:
  push:
    branches: [main]
    paths:
      - 'seller-buyer-app/**'

env:
  TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
  TG_CHAT_ID: "906884"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Build APK
        working-directory: seller-buyer-app
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Send APK to Telegram
        if: success()
        run: |
          APK=$(find seller-buyer-app/build -name "app-release.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          CAPTION="✅ GogoMarket APK готов! Размер: ${SIZE} | ${SHORT_SHA}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@${APK}" \
            -F "caption=${CAPTION}"

      - name: Notify failure
        if: failure()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=❌ Сборка провалилась! ${SHORT_SHA} https://github.com/${{ github.repository }}/actions"
