name: 📱 GogoMarket APK

on:
  push:
    branches: [main]
    paths:
      - 'seller-buyer-app/**'
      - '.github/workflows/flutter-seller-buyer.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version check
        run: flutter --version

      - name: Pub get
        working-directory: seller-buyer-app
        run: flutter pub get

      - name: Analyze
        working-directory: seller-buyer-app
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK
        working-directory: seller-buyer-app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gogomarket-apk
          path: seller-buyer-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Send APK to Telegram
        if: success()
        env:
          TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
          TG_CHAT_ID: "906884"
        run: |
          APK=seller-buyer-app/build/app/outputs/flutter-apk/app-release.apk
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@${APK}" \
            -F "caption=✅ GogoMarket APK готов! ${SHORT_SHA}"

      - name: Send error to Telegram  
        if: failure()
        env:
          TG_BOT_TOKEN: "8786274351:AAHXhlhzvIj8_xPQzE0e6bVBdMUlE-1dxq4"
          TG_CHAT_ID: "906884"
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=❌ Сборка провалилась! ${SHORT_SHA}%0A${URL}"
