name: seller-buyer-app CI

on:
  push:
    branches: [main]
    paths: ['seller-buyer-app/**']
  pull_request:
    branches: [main]
    paths: ['seller-buyer-app/**']

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - run: cd seller-buyer-app && flutter pub get
      - run: cd seller-buyer-app && flutter analyze --no-fatal-infos
      - run: cd seller-buyer-app && flutter test --coverage

  build-apk:
    needs: analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - run: cd seller-buyer-app && flutter pub get
      - run: cd seller-buyer-app && flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: seller-buyer-app-apk
          path: seller-buyer-app/build/app/outputs/flutter-apk/app-release.apk
